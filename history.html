<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gradient-to-br from-pink-50 via-white to-pink-50 p-5 h-screen flex flex-col w-full max-w-md mx-auto">
    <!-- Header -->
    <div class="flex items-center gap-3 mb-5 bg-white p-4 rounded-2xl shadow-md border border-pink-100">
        <a href="index.html" class="p-2 rounded-full hover:bg-pink-100 transition">
            <svg class="w-6 h-6 text-pink-700" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M5 19V4a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v13H7a2 2 0 0 0-2 2Zm0 0a2 2 0 0 0 2 2h12M9 3v14m7 0v4" />
            </svg>
        </a>
        <h1 class="text-xl font-bold text-gray-800">Transaction History</h1>
    </div>
    <div id="div-container" class="flex-1 overflow-y-auto space-y-3 pr-1">
    </div>
    <script>
        const render = () => {
            const lists = JSON.parse(localStorage.getItem('lists')) || [];
            const container = document.querySelector('#div-container');
            lists.forEach((list, index) => {
                const div1 = document.createElement('div');
                div1.className = 'flex justify-between items-center bg-gray-100 p-3 rounded mb-2';
                const div2 = document.createElement('div');
                div2.className = 'font-semibold flex flex-col gap-2';
                const h3 = document.createElement('h3');
                h3.className = 'text-blue-800'
                const p = document.createElement('p');
                p.className = 'text-blue-400'
                h3.innerText = list.note;
                p.innerText = list.date;
                div2.appendChild(h3);
                div2.appendChild(p);
                const p1 = document.createElement('p');
                const span = document.createElement('span');
                span.className = 'font-semibold text-pink-700';
                span.innerText = list.amount;
                p1.appendChild(span);
                div1.appendChild(div2);
                div1.appendChild(p1);
                container.appendChild(div1);
            })

        }
        render()
    </script>
</body>

</html>
