<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>git-project</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
  <div class="min-h-screen bg-gradient-to-br from-pink-100 via-white to-pink-50 p-4">
    <div class="max-w-md mx-auto">
      <!-- Header Card -->
      <div class="bg-white shadow-lg rounded-2xl p-5 mb-6 border border-pink-100">
        <div class="flex justify-between items-center mb-4">
          <h1 class="text-2xl font-bold text-gray-800">Budget Tracker</h1>
          <a href="history.html" class="p-2 rounded-full hover:bg-pink-100 transition">
            <svg class="w-6 h-6 text-gray-700" xmlns="http://www.w3.org/2000/svg" fill="currentColor"
              viewBox="0 0 24 24">
              <path fill-rule="evenodd"
                d="M7 2a2 2 0 0 0-2 2v1a1 1 0 0 0 0 2v1a1 1 0 0 0 0 2v1a1 1 0 1 0 0 2v1a1 1 0 1 0 0 2v1a1 1 0 1 0 0 2v1a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H7Zm3 8a3 3 0 1 1 6 0 3 3 0 0 1-6 0Zm-1 7a3 3 0 0 1 3-3h2a3 3 0 0 1 3 3 1 1 0 0 1-1 1h-6a1 1 0 0 1-1-1Z"
                clip-rule="evenodd" />
            </svg>
          </a>
        </div>
        <!-- Balance -->
        <div class="space-y-3">
          <div class="flex justify-between items-center bg-green-50 p-3 rounded-xl">
            <h5 class="font-medium text-gray-700">Current Balance</h5>
            <p class="text-green-600 font-bold text-lg">
              <span id="add-value">0</span> Kyats
            </p>
          </div>
          <div class="flex justify-between items-center bg-red-50 p-3 rounded-xl">
            <h5 class="font-medium text-gray-700">Expenses</h5>
            <p class="text-red-500 font-bold text-lg">
              <span id="sub-value">0</span> Kyats
            </p>
          </div>
        </div>
      </div>
      <!-- Form Card -->
      <form class="bg-white shadow-lg rounded-2xl p-5 border border-gray-100 space-y-4">
        <div>
          <label class="text-sm font-semibold text-gray-600">Note</label>
          <input type="text" id="note"
            class="mt-1 w-full border rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-pink-300" required>
        </div>
        <div>
          <label class="text-sm font-semibold text-gray-600">Amount</label>
          <input type="number" id="amount"
            class="mt-1 w-full border rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-pink-300" required>
        </div>
        <div>
          <label class="text-sm font-semibold text-gray-600">Date</label>
          <input type="date" id="date"
            class="mt-1 w-full border rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-pink-300" required>
        </div>
        <!-- Buttons -->
        <div class="flex gap-3 pt-2">
          <button type="submit" id="add-btn"
            class="w-full bg-green-500 hover:bg-green-600 text-white font-semibold p-3 rounded-xl shadow-md transition">
            Add Income
          </button>
          <button type="submit" id="sub-btn"
            class="w-full bg-red-500 hover:bg-red-600 text-white font-semibold p-3 rounded-xl shadow-md transition">
            Add Expense
          </button>
        </div>
      </form>
    </div>
  </div>
  <script>
    const addBtn = document.querySelector('#add-btn');
    const subBtn = document.querySelector('#sub-btn');
    const lists = JSON.parse(localStorage.getItem("lists")) || [];
    const addValue = document.querySelector('#add-value');
    const subValue = document.querySelector('#sub-value');
    const subBalance = localStorage.getItem('subbalance');
    const currentBalance = localStorage.getItem('balance');
    if (currentBalance !== null) addValue.innerText = currentBalance;
    if (subBalance !== null) subValue.innerText = subBalance;
    const getInputAdd = () => {
      let noteInput = document.querySelector('#note');
      let amountInput = document.querySelector('#amount');
      let dateInput = document.querySelector('#date');
      if (!noteInput.value || !amountInput.value || !dateInput.value) {
        alert("Please enter data first");
        return;
      }
      const list = {
        note: noteInput.value,
        amount: amountInput.value,
        date: dateInput.value
      }
      const currentAmount = Number(addValue.innerText);
      const newAmount = currentAmount + Number(amountInput.value);
      addValue.innerText = newAmount;
      localStorage.setItem('balance', newAmount);
      lists.push(list)
      localStorage.setItem('lists', JSON.stringify(lists));
      console.log(lists);
      noteInput.value = '';
      amountInput.value = '';
      dateInput.value = '';
    }
    const getInputExpense = () => {
      let noteInput = document.querySelector('#note');
      let amountInput = document.querySelector('#amount');
      let dateInput = document.querySelector('#date');
      if (!noteInput.value || !amountInput.value || !dateInput.value) {
        alert("Please enter data first");
        return;
      }
      const list = {
        note: noteInput.value,
        amount: amountInput.value,
        date: dateInput.value
      }
      const currentAmount = Number(subValue.innerText);
      const newAmount = currentAmount + Number(amountInput.value);
      subValue.innerText = newAmount;
      localStorage.setItem('subbalance', newAmount);
      const remainAmount = Number(localStorage.getItem('balance')) - Number(amountInput.value);
      addValue.innerText = remainAmount;
      localStorage.setItem('balance', remainAmount);
      lists.push(list)
      localStorage.setItem("lists", JSON.stringify(lists));
      console.log(lists);
      noteInput.value = '';
      amountInput.value = '';
      dateInput.value = '';
    }
    addBtn.addEventListener('click', getInputAdd)
    subBtn.addEventListener('click', getInputExpense)
  </script>
</body>

</html>
